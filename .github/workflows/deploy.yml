            echo "================================"
  
            
  environment:
    name: Update environment variables on Manager
    runs-on: ubuntu-22.04
    needs: [terraform]
    permissions:
      contents: write
    if: false
    # if: ${{ always() }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Crear archivo .env
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "bash -c 'cat > /root/.env <<EOF
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_HOST=$POSTGRES_HOST
          POSTGRES_PORT_WRITE=$POSTGRES_PORT
          POSTGRES_PORT_READ=$POSTGRES_PORT
          POSTGRES_PORT=$POSTGRES_PORT
          POSTGRES_DB=$POSTGRES_DB
          POSTGRES_VOLUME=$POSTGRES_VOLUME
          RABBITMQ_VOLUME=$RABBITMQ_VOLUME
          REDIS_VOLUME=${REDIS_VOLUME}
          RABBITMQ_VERSION=$RABBITMQ_VERSION
          TRAEFIK_VERSION=$TRAEFIK_VERSION
          HYDRA_VERSION=$HYDRA_VERSION
          REDIS_VERSION=$REDIS_VERSION
          HOST_EXTERNAL=${{ vars.MANAGER_IP }}
          PORT_EXTERNAL=$PORT_EXTERNAL
          NETWORK_APPLICATION=$NETWORK_APPLICATION
          BROKER=${BROKER}
          RABBITMQ_QUEUE=${RABBITMQ_QUEUE}
          EVT_PAYMENT_COMPLETED_EXCHANGE=${EVT_PAYMENT_COMPLETED_EXCHANGE}
          EVT_PAYMENT_PERSISTENCE_QUEUE=${EVT_PAYMENT_PERSISTENCE_QUEUE}
          EVT_USER_REGISTERED_EXCHANGE=${EVT_USER_REGISTERED_EXCHANGE}
          EVT_USER_REGISTERED_EMAIL_QUEUE=${EVT_USER_REGISTERED_EMAIL_QUEUE}
          CMD_CHAT_MESSAGE_SEND_EXCHANGE=${CMD_CHAT_MESSAGE_SEND_EXCHANGE}
          CMD_CHAT_MESSAGE_DELIVERY_QUEUE=${CMD_CHAT_MESSAGE_DELIVERY_QUEUE}
          CMD_CHAT_MESSAGE_PERSISTENCE_QUEUE=${CMD_CHAT_MESSAGE_PERSISTENCE_QUEUE}
          RABBITMQ_CHAT_CACHE_UPDATER_QUEUE=${CMD_CHAT_CACHE_UPDATER_QUEUE}
          CMD_RECOMMENDER_CALCULATE_QUEUE=${CMD_RECOMMENDER_CALCULATE_QUEUE}
          CMD_RECOMMENDER_CALCULATE_EXCHANGE=${CMD_RECOMMENDER_CALCULATE_EXCHANGE}
          CMD_SCRAPY_START_QUEUE=${CMD_SCRAPY_START_QUEUE}
          CMD_SCRAPY_START_EXCHANGE=${CMD_SCRAPY_START_EXCHANGE}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_HOST=${POSTGRES_HOST}
          CLIENT_ID=${CLIENT_ID}
          CLIENT_SECRET=${CLIENT_SECRET}
          GOOGLE_OAUTH2_CLIENT_ID=${GOOGLE_OAUTH2_CLIENT_ID}
          GOOGLE_OAUTH2_CLIENT_SECRET=${GOOGLE_OAUTH2_CLIENT_SECRET}
          TAG=${TAG}
          CRON_HOUR=${CRON_HOUR}
          CRON_MINUTE=${CRON_MINUTE}
          CMD_SCRAPY_START_QUEUE=${CMD_SCRAPY_START_QUEUE}
          CMD_SCRAPY_START_EXCHANGE=${CMD_SCRAPY_START_EXCHANGE}
          TOTAL_POSTS=${TOTAL_POSTS}
          USERNAME_INSTA=${USERNAME_INSTA}
          REDIS_HOST=${REDIS_HOST}
          PROTOCOL_EXTERNAL=${PROTOCOL_EXTERNAL}
          PROTOCOL_WS_EXTERNAL=${PROTOCOL_WS_EXTERNAL}
          MONITOREO=${MONITOREO}
          EOF'"

      - name: Crear config de Redis en Docker Swarm
        continue-on-error: true
        run: |
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-config.sh redis_config
          ' < infra/docker/config/redis/redis.conf
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-config.sh hydra_entrypoint
          ' < infra/docker/config/hydra/entrypoint.sh
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-config.sh traefik_tls
          ' < infra/docker/config/traefik/dynamic/tls_prod.yml

      - name: Crear secrets en Docker Swarm
        continue-on-error: true
        run: |
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-secret.sh postgres_password
          ' < <(printf "%s" "${{ secrets.POSTGRES_PASSWORD }}")
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-secret.sh client_id
          ' < <(printf "%s" "${{ secrets.CLIENT_ID }}")
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-secret.sh google_oauth2_client_id
          ' < <(printf "%s" "${{ secrets.GOOGLE_OAUTH2_CLIENT_ID }}")
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-secret.sh hydra_secret
          ' < <(printf "%s" "${{ secrets.HYDRA_SECRET }}")
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-secret.sh client_secret
          ' < <(printf "%s" "${{ secrets.CLIENT_SECRET }}")
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-secret.sh google_oauth2_client_secret
          ' < <(printf "%s" "${{ secrets.GOOGLE_OAUTH2_CLIENT_SECRET }}")
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-secret.sh traefik_server_crt
          ' < <(printf "%s" "${{ secrets.TRAEFIK_SERVER_CRT }}")
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-secret.sh traefik_server_key
          ' < <(printf "%s" "${{ secrets.TRAEFIK_SERVER_KEY }}")
        shell: bash

      - name: Copy docker-compose.yml to manager
        run: |
          git fetch origin
          git reset --hard ${{ github.sha }}
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            mkdir -p docker
          "
          scp -o StrictHostKeyChecking=no infra/docker/prod/* \
            root@${{ vars.MANAGER_IP }}:/root/docker/
      - name: deploy
        run: ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            /root/deploy_stack.sh
          "
          echo "Desplegado"
      - name: Mark deployed commit
        run: |
          git tag -f deploy-prod HEAD
          git push origin deploy-prod --force


# - name: Load environment
#   run: |
#     cat infra/config/system.env >> $GITHUB_ENV

jobs:
  terraform:
    if: false
    name: Terraform Apply
    runs-on: ubuntu-22.04
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_VAR_ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false
      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve
        env:
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
        
      - name: Get Swarm Manager IP
        id: get_ip
        run: |
          manager_ip=$(terraform -chdir=terraform output -raw manager_public_ip)
          curl -u "${{ secrets.DDNS_USERNAME }}:${{ secrets.DDNS_PASSWORD }}" \
            "https://dynupdate.no-ip.com/nic/update?hostname=marketdemo.ddns.net&myip=$manager_ip"

  build_bff:
    name: Build BFF
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - id: build_bff
        run: |
          echo "GITHUB_SHA=${{ github.sha }}"
          echo "HEAD=$(git rev-parse HEAD)"
          set -uo pipefail
          if git rev-parse deploy-prod >/dev/null 2>&1; then
              LAST_DEPLOYED=$(git rev-parse deploy-prod)
              CHANGED=$(git diff --name-only "$LAST_DEPLOYED" HEAD)
          else
              echo "Tag deploy-prod no existe. Primer despliegue."
              CHANGED=$(git ls-files)
          fi
          BFF_BUILD="SKIPPED"
          if echo "$CHANGED" | grep -qE "^(bff-service|config|postgres)/"; then
            echo "Building bff-service..."
            export COMPOSE_FILE=infra/docker/prod/imagenes.yml
            export HOST_EXTERNAL=${{ vars.MANAGER_IP }}
            sed -i "s|image: tcero76/bff-service:.*|image: tcero76/bff-service:${{ github.sha }}|g" infra/docker/prod/imagenes.yml
            if docker compose --project-directory ${PWD} --project-name marketplace build bff-service --push; then
              if docker manifest inspect tcero76/bff-service:${{ github.sha }} >/dev/null 2>&1; then
                git config user.name "github-actions"
                git config user.email "github-actions@github.com"
                if git commit -am "Update images for changed services to ${{ github.sha }}" \
                  && git push
                then
                    BFF_BUILD="SUCCESS"
                else
                    BFF_BUILD="GIT_COMMIT_ERROR"
                fi
              else
                BFF_BUILD="VERIFY_FAILED"
              fi
            else
                BFF_BUILD="FAILED"
            fi
          fi
          echo "BFF_BUILD=$BFF_BUILD" >> $GITHUB_ENV
          {
            echo "CHANGED<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Debug git build
        run: |
            echo "================================"
            echo "BUILD SUMMARY"
            echo "================================"
            echo "bff-service: $BFF_BUILD"
            echo "changed: $(echo "$CHANGED" | grep -qE "^(bff-service|config|postgres)/" && echo yes || echo no)"
            echo "================================"

  build_front:
    name: Build Front
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - id: build_front
        run: |
          echo "GITHUB_SHA=${{ github.sha }}"
          echo "HEAD=$(git rev-parse HEAD)"
          set -uo pipefail
          if git rev-parse deploy-prod >/dev/null 2>&1; then
              LAST_DEPLOYED=$(git rev-parse deploy-prod)
              CHANGED=$(git diff --name-only "$LAST_DEPLOYED" HEAD)
          else

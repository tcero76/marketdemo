              CHANGED=$(git ls-files)
          fi
          FRONT_BUILD="SKIPPED"
          if echo "$CHANGED" | grep -qE "^(front)/"; then
            echo "Building front..."
            export COMPOSE_FILE=infra/docker/prod/imagenes.yml
            export HOST_EXTERNAL=${{ vars.MANAGER_IP }}
            export VITE_MOCK=${{ vars.VITE_MOCK }}
            export GOOGLE_OAUTH2_CLIENT_ID=${{ secrets.GOOGLE_OAUTH2_CLIENT_ID }}
            sed -i "s|image: tcero76/front:.*|image: tcero76/front:${{ github.sha }}|g" infra/docker/prod/imagenes.yml
            if docker compose --project-directory ${PWD} --project-name marketplace --env-file infra/.env build front --push; then
              if docker manifest inspect tcero76/front:${{ github.sha }} >/dev/null 2>&1; then
                git config user.name "github-actions"
                git config user.email "github-actions@github.com"
                if git commit -am "Update images for changed services to ${{ github.sha }}" \
                  && git push
                then
                    FRONT_BUILD="SUCCESS"
                else
                    FRONT_BUILD="GIT_COMMIT_ERROR"
                fi
              else
                FRONT_BUILD="VERIFY_FAILED"
              fi
            else
                FRONT_BUILD="FAILED"
            fi
          fi
          echo "FRONT_BUILD=$FRONT_BUILD" >> $GITHUB_ENV
          {
            echo "CHANGED<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Debug git build
        run: |
            echo "================================"
            echo "BUILD SUMMARY"
            echo "================================"
            echo "front: $FRONT_BUILD"
            echo "changed: $(echo "$CHANGED" | grep -qE "^(front)/" && echo yes || echo no)"
            echo "================================"

  build_flyway:
    name: Build Flyway
    runs-on: ubuntu-22.04

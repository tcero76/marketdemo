name: deploy

on:
  # pull_request:
  #   branches:
  #     - main
  # push:
  #   branches:
  #     - main
  #   tags:
  #     - "v*.*.*"
  workflow_dispatch:
    inputs:
      run_job:
        description: "Job a ejecutar"
        required: true
        default: "all"
env:
  PROFILE: prod
  # Application
  PORT_EXTERNAL: 443
  NETWORK_APPLICATION: application
  TF_VAR_overlay_network: application
  TAG: v0.0.0
  COMPOSE_PROFILE: bff
  MONITOREO: "false"
  COMPOSE_FILE: infra/docker/prod/imagenes.yml:infra/docker/prod/services.yml:infra/docker/prod/monitoring.yml:infra/docker/prod/postgres.yml:infra/docker/prod/hydra.yml:infra/docker/prod/envoy.yml:infra/docker/prod/rabbitmq.yml:infra/docker/prod/mediamtx.yml:infra/docker/prod/redis.yml:infra/docker/prod/elastic.yml:infra/docker/prod/common.yml

  #secrets
  # POSTGRES_CDC_PASSWORD: ${{ secrets.POSTGRES_CDC_PASSWORD}}
  CLIENT_ID: 657d0bb0-2314-4c8b-b649-1525af797d72
  CLIENT_SECRET: ${{ secrets.CLIENT_SECRET}}
  GOOGLE_OAUTH2_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH2_CLIENT_ID}}
  GOOGLE_OAUTH2_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH2_CLIENT_SECRET}}

  # Versions
  HYDRA_VERSION: v2.3.0
  OATHKEEPER_VERSION: v0.40.9
  NODE_VERSION: 24.0.1
  RABBITMQ_VERSION: 4.0-management
  MEDIAMTX_VERSION: 1.12.2
  REDIS_VERSION: 8.0.0
  ELASTICSEARCH_VERSION: 8.12.0
  KIBANA_VERSION: 8.12.0
  LOGSTASH_VERSION: 8.12.0
  CLICKHOUSE_VERSION: 25.10.1
  TIMESCALEDB_VERSION: 2.20.1-pg17
  PATRONI_TIMESCALEDB_VERSION: 17
  HOUSEPLANT_VERSION: 0.0.0
  TRAEFIK_VERSION: v3.7.5
  # Volumes
  CLICKHOUSE_VOLUME: /mnt/data/clickhouse
  POSTGRES_VOLUME: /mnt/data/timescaleDB
  RABBITMQ_VOLUME: /mnt/data/rabbitmq
  REDIS_VOLUME: /mnt/data/redis
  GRAFANA_VOLUME: /mnt/data/grafana
  PROMETHEUS_VOLUME: /mnt/data/prometheus
  MEDIAMTX_VOLUME: /mnt/data/mediamtx
  # jobs
  TOTAL_POSTS: 5
  CRON_HOUR: 23
  CRON_MINUTE: 12
  #colas
  BROKER: amqp://guest:guest@broker:5672
  RECOMENDER_QUEUE: recomender_queue
  EVT_PAYMENT_COMPLETED_EXCHANGE: evt_payment_completed_exchange
  EVT_PAYMENT_PERSISTENCE_QUEUE: evt_payment_persistence_queue
  CMD_CHAT_MESSAGE_SEND_EXCHANGE: cmd_chat_message_send_exchange
  CMD_CHAT_MESSAGE_DELIVERY_QUEUE: cmd_chat_message_delivery_queue
  RABBITMQ_CHAT_CACHE_UPDATER_QUEUE: chat_cache_updater_queue
  CMD_CHAT_MESSAGE_PERSISTENCE_QUEUE: cmd_chat_message_persistence_queue
  EVT_USER_REGISTERED_EMAIL_QUEUE: evt_user_registered_email_queue
  EVT_USER_REGISTERED_EXCHANGE: evt_user_registered_exchange
  CMD_RECOMMENDER_CALCULATE_QUEUE: cmd_recommender_calculate_queue
  CMD_RECOMMENDER_CALCULATE_EXCHANGE: cmd_recommender_calculate_exchange
  CMD_SCRAPY_START_QUEUE: cmd_scrapy_start_queue
  CMD_SCRAPY_START_EXCHANGE: cmd_scrapy_start_exchange
  # redis
  REDIS_HOST: cache
  # postgres
  POSTGRES_USER: tcero
  POSTGRES_DB: marketplace
  POSTGRES_PORT_WRITE: 5000
  POSTGRES_PORT_READ: 5001
  POSTGRES_PORT: 5432
  POSTGRES_HOST: db

  #OAuth google
  GOOGLE_OAUTH2_REDIRECT_URI: http://localhost:8080/bff/callback
  # email
  SMTP_HOST: smtp.gmail.com
  SMTP_PORT: 587
  SMTP_USER: leonardo.lastra@gmail.com
  # docker
  DOCKER_USERNAME: tcero76
  PROTOCOL_EXTERNAL: https
  PROTOCOL_WS_EXTERNAL: ws

# - name: Load environment
#   run: |
#     cat infra/config/system.env >> $GITHUB_ENV

jobs:
  terraform:
    if: false
    name: Terraform Apply
    runs-on: ubuntu-22.04
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_VAR_ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false
      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
        
      - name: Get Swarm Manager IP
        working-directory: terraform
        id: get_ip
        run: |
          set -euo pipefail
          manager_ip=$(terraform output -raw manager_public_ip)
          curl -u "${{ secrets.DDNS_USERNAME }}:${{ secrets.DDNS_PASSWORD }}" \
            "https://dynupdate.no-ip.com/nic/update?hostname=marketdemo.ddns.net&myip=$manager_ip"

  build_all:
    # needs: [terraform]
    strategy:
      max-parallel: 1
      matrix:
        include:
          - service: front
            tag: push-front
            dir: front
            image: tcero76/front
            prefix: FRONT

          - service: bff
            tag: push-bff
            dir: bff-service|postgres|clickhouse|redis|rabbitmq|config
            image: tcero76/bff-service
            prefix: BFF

          - service: scrap
            tag: push-scrap
            dir: scrap-service|rabbitmq
            image: tcero76/scrap-service
            prefix: SCRAP

          - service: flyway
            tag: push-flyway
            dir: flyway
            image: tcero76/flyway
            prefix: FLYWAY
    name: Build Front
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
  
      - name: detecta cambios
        run: scripts/workflow/detecta_cambios.sh \
          ${{ matrix.tag }} \
          ${{ matrix.dir }} \
          ${{ matrix.prefix }}

      - name: Build Front
        if: env[format('{0}_CHANGED', matrix.prefix)] == 'true'
        env:
          HOST_EXTERNAL: ${{ vars.MANAGER_IP }}
          VITE_MOCK: ${{ vars.VITE_MOCK }}
          GOOGLE_OAUTH2_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH2_CLIENT_ID }}
          GITHUB_SHA: ${{ github.sha }}
        run: scripts/workflow/build.sh\
          "${{ matrix.service }}" \
          "${{ matrix.image }}" \
          "${{ matrix.tag }}"\
          ${{ matrix.prefix }}

  environment:
    name: Update environment variables on Manager
    runs-on: ubuntu-22.04
    needs: [build_all]
    permissions:
      contents: write
    if: false
    # if: ${{ always() }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Crear archivo .env
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "bash -c 'cat > /root/.env <<EOF
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_HOST=$POSTGRES_HOST
          POSTGRES_PORT_WRITE=$POSTGRES_PORT
          POSTGRES_PORT_READ=$POSTGRES_PORT
          POSTGRES_PORT=$POSTGRES_PORT
          POSTGRES_DB=$POSTGRES_DB
          POSTGRES_VOLUME=$POSTGRES_VOLUME
          RABBITMQ_VOLUME=$RABBITMQ_VOLUME
          REDIS_VOLUME=${REDIS_VOLUME}
          RABBITMQ_VERSION=$RABBITMQ_VERSION
          TRAEFIK_VERSION=$TRAEFIK_VERSION
          HYDRA_VERSION=$HYDRA_VERSION
          REDIS_VERSION=$REDIS_VERSION
          HOST_EXTERNAL=${{ vars.MANAGER_IP }}
          PORT_EXTERNAL=$PORT_EXTERNAL
          NETWORK_APPLICATION=$NETWORK_APPLICATION
          BROKER=${BROKER}
          RABBITMQ_QUEUE=${RABBITMQ_QUEUE}
          EVT_PAYMENT_COMPLETED_EXCHANGE=${EVT_PAYMENT_COMPLETED_EXCHANGE}
          EVT_PAYMENT_PERSISTENCE_QUEUE=${EVT_PAYMENT_PERSISTENCE_QUEUE}
          EVT_USER_REGISTERED_EXCHANGE=${EVT_USER_REGISTERED_EXCHANGE}
          EVT_USER_REGISTERED_EMAIL_QUEUE=${EVT_USER_REGISTERED_EMAIL_QUEUE}
          CMD_CHAT_MESSAGE_SEND_EXCHANGE=${CMD_CHAT_MESSAGE_SEND_EXCHANGE}
          CMD_CHAT_MESSAGE_DELIVERY_QUEUE=${CMD_CHAT_MESSAGE_DELIVERY_QUEUE}
          CMD_CHAT_MESSAGE_PERSISTENCE_QUEUE=${CMD_CHAT_MESSAGE_PERSISTENCE_QUEUE}
          RABBITMQ_CHAT_CACHE_UPDATER_QUEUE=${CMD_CHAT_CACHE_UPDATER_QUEUE}
          CMD_RECOMMENDER_CALCULATE_QUEUE=${CMD_RECOMMENDER_CALCULATE_QUEUE}
          CMD_RECOMMENDER_CALCULATE_EXCHANGE=${CMD_RECOMMENDER_CALCULATE_EXCHANGE}
          CMD_SCRAPY_START_QUEUE=${CMD_SCRAPY_START_QUEUE}
          CMD_SCRAPY_START_EXCHANGE=${CMD_SCRAPY_START_EXCHANGE}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_HOST=${POSTGRES_HOST}
          CLIENT_ID=${CLIENT_ID}
          CLIENT_SECRET=${CLIENT_SECRET}
          GOOGLE_OAUTH2_CLIENT_ID=${GOOGLE_OAUTH2_CLIENT_ID}
          GOOGLE_OAUTH2_CLIENT_SECRET=${GOOGLE_OAUTH2_CLIENT_SECRET}
          TAG=${TAG}
          CRON_HOUR=${CRON_HOUR}
          CRON_MINUTE=${CRON_MINUTE}
          CMD_SCRAPY_START_QUEUE=${CMD_SCRAPY_START_QUEUE}
          CMD_SCRAPY_START_EXCHANGE=${CMD_SCRAPY_START_EXCHANGE}
          TOTAL_POSTS=${TOTAL_POSTS}
          USERNAME_INSTA=${USERNAME_INSTA}
          REDIS_HOST=${REDIS_HOST}
          PROTOCOL_EXTERNAL=${PROTOCOL_EXTERNAL}
          PROTOCOL_WS_EXTERNAL=${PROTOCOL_WS_EXTERNAL}
          MONITOREO=${MONITOREO}
          EOF'"

      - name: Crear config de Redis en Docker Swarm
        continue-on-error: true
        run: |
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-config.sh redis_config
          ' < infra/docker/config/redis/redis.conf
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-config.sh hydra_entrypoint
          ' < infra/docker/config/hydra/entrypoint.sh
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-config.sh traefik_tls
          ' < infra/docker/config/traefik/dynamic/tls_prod.yml

      - name: Crear secrets en Docker Swarm
        continue-on-error: true
        run: |
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-secret.sh postgres_password
          ' < <(printf "%s" "${{ secrets.POSTGRES_PASSWORD }}")
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-secret.sh client_id
          ' < <(printf "%s" "${{ secrets.CLIENT_ID }}")
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-secret.sh google_oauth2_client_id
          ' < <(printf "%s" "${{ secrets.GOOGLE_OAUTH2_CLIENT_ID }}")
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-secret.sh hydra_secret
          ' < <(printf "%s" "${{ secrets.HYDRA_SECRET }}")
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-secret.sh client_secret
          ' < <(printf "%s" "${{ secrets.CLIENT_SECRET }}")
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-secret.sh google_oauth2_client_secret
          ' < <(printf "%s" "${{ secrets.GOOGLE_OAUTH2_CLIENT_SECRET }}")
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-secret.sh traefik_server_crt
          ' < <(printf "%s" "${{ secrets.TRAEFIK_SERVER_CRT }}")
          ssh root@${{ vars.MANAGER_IP }} '
            bash /root/deploy-secret.sh traefik_server_key
          ' < <(printf "%s" "${{ secrets.TRAEFIK_SERVER_KEY }}")
        shell: bash

      - name: Copy docker-compose.yml to manager
        run: |
          git fetch origin
          git reset --hard ${{ github.sha }}
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            mkdir -p docker
          "
          scp -o StrictHostKeyChecking=no infra/docker/prod/* \
            root@${{ vars.MANAGER_IP }}:/root/docker/
      - name: deploy
        run: ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            /root/deploy_stack.sh
          "
          echo "Desplegado"
      - name: Mark deployed commit
        run: |
          git tag -f deploy-prod HEAD
          git push origin deploy-prod --force

  report:
    name: Update environment variables on Manager
    runs-on: ubuntu-22.04
    needs: [build_all]
    steps:
      - name: Debug git build
        run: scripts/workflow/report.sh

name: deploy

on:
  # pull_request:
  #   branches:
  #     - main
  # push:
  #   branches:
  #     - main
  #   tags:
  #     - "v*.*.*"
  workflow_dispatch:
    inputs:
      run_job:
        description: "Job a ejecutar"
        required: true
        default: "all"
env:
  PROFILE: prod
  # Application
  PORT_EXTERNAL: 443
  NETWORK_APPLICATION: application
  TF_VAR_overlay_network: application
  TAG: v0.0.0
  COMPOSE_PROFILE: bff
  MONITOREO: "false"
  COMPOSE_FILE: infra/docker/imagenes.yml:infra/docker/prod/services.yml:infra/docker/prod/monitoring.yml:infra/docker/prod/postgres.yml:infra/docker/prod/clickhouse.yml:infra/docker/prod/hydra.yml:infra/docker/prod/envoy.yml:infra/docker/prod/rabbitmq.yml:infra/docker/prod/mediamtx.yml:infra/docker/prod/redis.yml:infra/docker/prod/elastic.yml:infra/docker/prod/common.yml

  #secrets
  # POSTGRES_CDC_PASSWORD: ${{ secrets.POSTGRES_CDC_PASSWORD}}
  CLIENT_ID: 657d0bb0-2314-4c8b-b649-1525af797d72
  CLIENT_SECRET: ${{ secrets.CLIENT_SECRET}}
  GOOGLE_OAUTH2_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH2_CLIENT_ID}}
  GOOGLE_OAUTH2_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH2_CLIENT_SECRET}}

  # Versions
  HYDRA_VERSION: v2.3.0
  OATHKEEPER_VERSION: v0.40.9
  NODE_VERSION: 24.0.1
  RABBITMQ_VERSION: 4.0-management
  MEDIAMTX_VERSION: 1.12.2
  REDIS_VERSION: 8.0.0
  ELASTICSEARCH_VERSION: 8.12.0
  KIBANA_VERSION: 8.12.0
  LOGSTASH_VERSION: 8.12.0
  CLICKHOUSE_VERSION: 25.10.1
  TIMESCALEDB_VERSION: 2.20.1-pg17
  PATRONI_TIMESCALEDB_VERSION: 17
  HOUSEPLANT_VERSION: 0.0.0
  TRAEFIK_VERSION: v3.7.5
  # Volumes
  CLICKHOUSE_VOLUME: /mnt/data/clickhouse
  POSTGRES_VOLUME: /mnt/data/timescaleDB
  RABBITMQ_VOLUME: /mnt/data/rabbitmq
  REDIS_VOLUME: /mnt/data/redis
  GRAFANA_VOLUME: /mnt/data/grafana
  PROMETHEUS_VOLUME: /mnt/data/prometheus
  MEDIAMTX_VOLUME: /mnt/data/mediamtx
  # jobs
  TOTAL_POSTS: 5
  CRON_HOUR: 23
  CRON_MINUTE: 12
  #colas
  BROKER: amqp://guest:guest@broker:5672
  RECOMENDER_QUEUE: recomender_queue
  EVT_PAYMENT_COMPLETED_EXCHANGE: evt_payment_completed_exchange
  EVT_PAYMENT_PERSISTENCE_QUEUE: evt_payment_persistence_queue
  CMD_CHAT_MESSAGE_SEND_EXCHANGE: cmd_chat_message_send_exchange
  CMD_CHAT_MESSAGE_DELIVERY_QUEUE: cmd_chat_message_delivery_queue
  RABBITMQ_CHAT_CACHE_UPDATER_QUEUE: chat_cache_updater_queue
  CMD_CHAT_MESSAGE_PERSISTENCE_QUEUE: cmd_chat_message_persistence_queue
  EVT_USER_REGISTERED_EMAIL_QUEUE: evt_user_registered_email_queue
  EVT_USER_REGISTERED_EXCHANGE: evt_user_registered_exchange
  CMD_RECOMMENDER_CALCULATE_QUEUE: cmd_recommender_calculate_queue
  CMD_RECOMMENDER_CALCULATE_EXCHANGE: cmd_recommender_calculate_exchange
  CMD_SCRAPY_START_QUEUE: cmd_scrapy_start_queue
  CMD_SCRAPY_START_EXCHANGE: cmd_scrapy_start_exchange
  # redis
  REDIS_HOST: cache
  # postgres
  POSTGRES_USER: tcero
  POSTGRES_DB: marketplace
  POSTGRES_PORT_WRITE: 5000
  POSTGRES_PORT_READ: 5001
  POSTGRES_HOST: haproxy

  #OAuth google
  GOOGLE_OAUTH2_REDIRECT_URI: http://localhost:8080/bff/callback
  # email
  SMTP_HOST: smtp.gmail.com
  SMTP_PORT: 587
  SMTP_USER: leonardo.lastra@gmail.com
  # docker
  DOCKER_USERNAME: tcero76
  PROTOCOL_EXTERNAL: https
  PROTOCOL_WS_EXTERNAL: ws

# - name: Load environment
#   run: |
#     cat infra/config/system.env >> $GITHUB_ENV


jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-22.04
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_VAR_ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false
      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve
        env:
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
        
      - name: Get Swarm Manager IP
        id: get_ip
        run: |
          manager_ip=$(terraform -chdir=terraform output -raw manager_public_ip)
          curl -u "${{ secrets.DDNS_USERNAME }}:${{ secrets.DDNS_PASSWORD }}" \
            "https://dynupdate.no-ip.com/nic/update?hostname=marketdemo.ddns.net&myip=$manager_ip"

  detect_changed_services:
    runs-on: ubuntu-22.04
    outputs:
      front: ${{ steps.detect.outputs.front }}
      bff: ${{ steps.detect.outputs.bff }}
      scrap: ${{ steps.detect.outputs.scrap }}
      flyway: ${{ steps.detect.outputs.flyway }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        run: |
          # Inicializar flags
          echo "front=true" >> $GITHUB_OUTPUT
          echo "bff=false" >> $GITHUB_OUTPUT
          echo "scrap=false" >> $GITHUB_OUTPUT
          echo "flyway=false" >> $GITHUB_OUTPUT
          # Obtener lista de archivos modificados
          cd "$GITHUB_WORKSPACE"
          git fetch --tags
          if git rev-parse deploy-prod >/dev/null 2>&1; then
              LAST_DEPLOYED=$(git rev-parse deploy-prod)
              CHANGED=$(git diff --name-only "$LAST_DEPLOYED" HEAD)
          else
              echo "Tag deploy-prod no existe. Primer despliegue."
              CHANGED=$(git ls-files)
          fi
          CURRENT=$(git rev-parse HEAD)

          echo "Último deploy: $LAST_DEPLOYED"
          echo "Commit actual: $CURRENT"
          CHANGED=$(git diff --name-only $LAST_DEPLOYED $CURRENT)

          # echo "$CHANGED" | grep "^front/" && echo "front=true" >> $GITHUB_OUTPUT
          if echo "$CHANGED" | grep -E "^(bff-service|postgres|clickhouse|redis|rabbitmq|config)/"; then
            echo "bff=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -E "^(scrap-service|rabbitmq)/"; then
            echo "scrap=true" >> $GITHUB_OUTPUT
          fi
          echo "$CHANGED" | grep "^flyway/" && echo "flyway=true" >> $GITHUB_OUTPUT
          echo "Step finalizado"
      - name: Mostrar outputs detectados
        run: |
          echo "front = ${{ steps.detect.outputs.front }}"
          echo "bff = ${{ steps.detect.outputs.bff }}"
          echo "scrap = ${{ steps.detect.outputs.scrap }}"
          echo "flyway = ${{ steps.detect.outputs.flyway }}"

  build_services:
    needs: [detect_changed_services,terraform]
    if: >
      success() &&
      (
        needs.detect_changed_services.outputs.front == 'true' ||
        needs.detect_changed_services.outputs.bff == 'true' ||
        needs.detect_changed_services.outputs.scrap == 'true' ||
        needs.detect_changed_services.outputs.flyway == 'true'
      )
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        service:
          - name: front
            path: front
            image: tcero76/front
            build_target: front
            flag: front
          - name: bff-service
            path: bff-service
            image: tcero76/bff-service
            build_target: bff-service
            flag: bff
          - name: scrap-service
            path: scrap-service
            image: tcero76/scrap-service
            build_target: scrap-service
            flag: scrap
          - name: flyway
            path: flyway
            image: tcero76/flyway
            build_target: flyway
            flag: flyway
      max-parallel: 1
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Skip service (no changes)
        if: ${{ needs.detect_changed_services.outputs[matrix.service.flag] != 'true' }}
        run: echo "Service ${{ matrix.service.name }} did not change, skipping build"

      - name: Build image and update tag in manifests
        if: ${{ needs.detect_changed_services.outputs[matrix.service.flag] == 'true' }}
        run: |
          export COMPOSE_FILE=infra/docker/prod/build.yml:infra/docker/prod/imagenes.yml
          export HOST_EXTERNAL=${{ vars.MANAGER_IP }}
          docker compose \
            --project-directory ${PWD} \
            --project-name marketplace \
            build \
            ${{ matrix.service.build_target }} \
            --push
          sed -i "s|image: ${{ matrix.service.image }}:.*|image: ${{ matrix.service.image }}:${{ github.sha }}|g" infra/docker/prod/imagenes.yml

  commit_images:
    needs: [build_services, detect_changed_services]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update only changed images
        run: |
          changed=false

          if [ "${{ needs.detect_changed_services.outputs.front }}" = "true" ]; then
            sed -i "s|image: tcero76/front:.*|image: tcero76/front:${{ github.sha }}|g" infra/docker/prod/imagenes.yml
            changed=true
          fi

          if [ "${{ needs.detect_changed_services.outputs.bff }}" = "true" ]; then
            sed -i "s|image: tcero76/bff-service:.*|image: tcero76/bff-service:${{ github.sha }}|g" infra/docker/prod/imagenes.yml
            changed=true
          fi

          if [ "${{ needs.detect_changed_services.outputs.scrap }}" = "true" ]; then
            sed -i "s|image: tcero76/scrap-service:.*|image: tcero76/scrap-service:${{ github.sha }}|g" infra/docker/prod/imagenes.yml
            changed=true
          fi

          if [ "${{ needs.detect_changed_services.outputs.flyway }}" = "true" ]; then
            sed -i "s|image: tcero76/flyway:.*|image: tcero76/flyway:${{ github.sha }}|g" infra/docker/prod/imagenes.yml
            changed=true
          fi

          if [ "$changed" = "false" ]; then
            echo "Ningún servicio cambió, no hay nada que commitear"
            exit 0
          fi

      - name: Debug git diff
        run: |
          echo "==== git diff ===="
          git diff infra/docker/prod/imagenes.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit -am "Update images for changed services to ${{ github.sha }}"
          git push

  environment:
    name: Update environment variables on Manager
    runs-on: ubuntu-22.04
    needs: [commit_images,terraform]
    permissions:
      contents: write
    if: ${{ always() }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Crear archivo .env
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "bash -c 'cat > /root/.env <<EOF
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_HOST=$POSTGRES_HOST
          POSTGRES_PORT_WRITE=$POSTGRES_PORT_WRITE
          POSTGRES_PORT_READ=$POSTGRES_PORT_READ
          POSTGRES_DB=$POSTGRES_DB
          POSTGRES_VOLUME=$POSTGRES_VOLUME
          RABBITMQ_VOLUME=$RABBITMQ_VOLUME
          REDIS_VOLUME=${REDIS_VOLUME}
          RABBITMQ_VERSION=$RABBITMQ_VERSION
          TRAEFIK_VERSION=$TRAEFIK_VERSION
          HYDRA_VERSION=$HYDRA_VERSION
          REDIS_VERSION=$REDIS_VERSION
          HOST_EXTERNAL=${{ vars.MANAGER_IP }}
          PORT_EXTERNAL=$PORT_EXTERNAL
          NETWORK_APPLICATION=$NETWORK_APPLICATION
          BROKER=${BROKER}
          RABBITMQ_QUEUE=${RABBITMQ_QUEUE}
          EVT_PAYMENT_COMPLETED_EXCHANGE=${EVT_PAYMENT_COMPLETED_EXCHANGE}
          EVT_PAYMENT_PERSISTENCE_QUEUE=${EVT_PAYMENT_PERSISTENCE_QUEUE}
          EVT_USER_REGISTERED_EXCHANGE=${EVT_USER_REGISTERED_EXCHANGE}
          EVT_USER_REGISTERED_EMAIL_QUEUE=${EVT_USER_REGISTERED_EMAIL_QUEUE}
          CMD_CHAT_MESSAGE_SEND_EXCHANGE=${CMD_CHAT_MESSAGE_SEND_EXCHANGE}
          CMD_CHAT_MESSAGE_DELIVERY_QUEUE=${CMD_CHAT_MESSAGE_DELIVERY_QUEUE}
          CMD_CHAT_MESSAGE_PERSISTENCE_QUEUE=${CMD_CHAT_MESSAGE_PERSISTENCE_QUEUE}
          RABBITMQ_CHAT_CACHE_UPDATER_QUEUE=${CMD_CHAT_CACHE_UPDATER_QUEUE}
          CMD_RECOMMENDER_CALCULATE_QUEUE=${CMD_RECOMMENDER_CALCULATE_QUEUE}
          CMD_RECOMMENDER_CALCULATE_EXCHANGE=${CMD_RECOMMENDER_CALCULATE_EXCHANGE}
          CMD_SCRAPY_START_QUEUE=${CMD_SCRAPY_START_QUEUE}
          CMD_SCRAPY_START_EXCHANGE=${CMD_SCRAPY_START_EXCHANGE}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_HOST=${POSTGRES_HOST}
          CLIENT_ID=${CLIENT_ID}
          CLIENT_SECRET=${CLIENT_SECRET}
          GOOGLE_OAUTH2_CLIENT_ID=${GOOGLE_OAUTH2_CLIENT_ID}
          GOOGLE_OAUTH2_CLIENT_SECRET=${GOOGLE_OAUTH2_CLIENT_SECRET}
          TAG=${TAG}
          CRON_HOUR=${CRON_HOUR}
          CRON_MINUTE=${CRON_MINUTE}
          CMD_SCRAPY_START_QUEUE=${CMD_SCRAPY_START_QUEUE}
          CMD_SCRAPY_START_EXCHANGE=${CMD_SCRAPY_START_EXCHANGE}
          TOTAL_POSTS=${TOTAL_POSTS}
          USERNAME_INSTA=${USERNAME_INSTA}
          REDIS_HOST=${REDIS_HOST}
          PROTOCOL_EXTERNAL=${PROTOCOL_EXTERNAL}
          PROTOCOL_WS_EXTERNAL=${PROTOCOL_WS_EXTERNAL}
          MONITOREO=${MONITOREO}
          EOF'"

      - name: Crear config de Redis en Docker Swarm
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            cat infra/docker/config/redis/redis.conf | docker config create redis_config - \
                && echo '✅ Config redis_config creado' \
                || echo 'ℹ️ Config redis_config ya existe, continuando...'
          "
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            cat infra/docker/config/hydra/entrypoint.sh | docker config create hydra_entrypoint - \
                && echo '✅ Config hydra_entrypoint creado' \
                || echo 'ℹ️ Config hydra_entrypoint ya existe, continuando...'
          "
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            cat infra/docker/config/traefik/dynamic/tls.yml | docker config create traefik_tls - \
                && echo '✅ Config trafik_tls creado' \
                || echo 'ℹ️ Config trafik_tls ya existe, continuando...'
          "
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            cat infra/docker/config/traefik/server.crt | docker config create traefik_server_crt - \
                && echo '✅ Config traefik_server_crt creado' \
                || echo 'ℹ️ Config traefik_server_crt ya existe, continuando...'
          "
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            cat infra/docker/config/traefik/server.key | docker config create traefik_server_key - \
                && echo '✅ Config traefik_server_key creado' \
                || echo 'ℹ️ Config traefik_server_key ya existe, continuando...'
          "

      - name: Crear secrets en Docker Swarm
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            echo '${{ secrets.POSTGRES_PASSWORD }}' | docker secret create postgres_password - \
              && echo '✅ Secret postgres_password creado' \
              || echo 'ℹ️ Secret postgres_password ya existe, continuando...'
          "
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            echo '${{ secrets.CLIENT_ID }}' | docker secret create client_id - \
              && echo '✅ Secret client_id creado' \
              || echo 'ℹ️ Secret client_id ya existe, continuando...'
          "
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            echo '${{ secrets.GOOGLE_OAUTH2_CLIENT_ID }}' | docker secret create google_oauth2_client_id - \
              && echo '✅ Secret google_oauth2_client_id creado' \
              || echo 'ℹ️ Secret google_oauth2_client_id ya existe, continuando...'
          "
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            echo '${{ secrets.HYDRA_SECRET }}' | docker secret create hydra_secret - \
              && echo '✅ Secret hydra_secret creado' \
              || echo 'ℹ️ Secret hydra_secret ya existe, continuando...'
          "
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            echo '${{ secrets.PATRONI_ADMIN_PASSWORD }}' | docker secret create patroni_admin_password - \
              && echo '✅ Secret patroni_admin_password creado' \
              || echo 'ℹ️ Secret patroni_admin_password ya existe, continuando...'
          "
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            echo '${{ secrets.CLIENT_SECRET }}' | docker secret create client_secret - \
              && echo '✅ Secret client_secret creado' \
              || echo 'ℹ️ Secret client_secret ya existe, continuando...'
          "
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            echo '${{ secrets.GOOGLE_OAUTH2_CLIENT_SECRET }}' | docker secret create google_oauth2_client_secret - \
              && echo '✅ Secret google_oauth2_client_secret creado' \
              || echo 'ℹ️ Secret google_oauth2_client_secret ya existe, continuando...'
          "
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            echo '${{ secrets.PASSWORD_INSTA }}' | docker secret create password_insta - \
              && echo '✅ Secret password_insta creado' \
              || echo 'ℹ️ Secret password_insta ya existe, continuando...'
          "
        shell: bash

      - name: Copy docker-compose.yml to manager
        run: |
          git fetch origin
          git reset --hard ${{ github.sha }}
          ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            mkdir -p docker
          "
          scp -o StrictHostKeyChecking=no infra/docker/prod/* \
            root@${{ vars.MANAGER_IP }}:/root/docker/
      - name: deploy
        run: ssh -o StrictHostKeyChecking=no root@${{ vars.MANAGER_IP }} "
            /root/deploy_stack.sh
          "
          echo "Desplegado"
      - name: Mark deployed commit
        run: |
          git tag -f deploy-prod HEAD
          git push origin deploy-prod --force


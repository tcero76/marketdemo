          FLYWAY_BUILD="SKIPPED"
          if echo "$CHANGED" | grep -qE "^(flyway)/"; then
            echo "Building flyway..."
            export COMPOSE_FILE=infra/docker/prod/imagenes.yml
            export HOST_EXTERNAL=${{ vars.MANAGER_IP }}
            export VITE_MOCK=${{ vars.VITE_MOCK }}
            export GOOGLE_OAUTH2_CLIENT_ID=${{ secrets.GOOGLE_OAUTH2_CLIENT_ID }}
            sed -i "s|image: tcero76/flyway:.*|image: tcero76/flyway:${{ github.sha }}|g" infra/docker/prod/imagenes.yml
            if docker compose --project-directory ${PWD} --project-name marketplace --env-file infra/.env build flyway --push; then
              if docker manifest inspect tcero76/flyway:${{ github.sha }} >/dev/null 2>&1; then
                git config user.name "github-actions"
                git config user.email "github-actions@github.com"
                if git commit -am "Update images for changed services to ${{ github.sha }}" \
                  && git push
                then
                    FLYWAY_BUILD="SUCCESS"
                else
                    FLYWAY_BUILD="GIT_COMMIT_ERROR"
                fi
              else

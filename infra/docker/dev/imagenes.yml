services:
  bff-service:
    image: tcero76/bff-service:${TAG}
    build:
      dockerfile: ./bff-service/deploy/Dockerfile
      context: .
      target: ${PROFILE}
  front:
    image: tcero76/frontend:${TAG}
    build:
      dockerfile: deploy/Dockerfile
      context: ./front
      target: ${PROFILE}
      args:
        VITE_HOST: "${PROTOCOL_EXTERNAL}://${HOST_EXTERNAL}:${PORT_EXTERNAL}"
        VITE_WS: "ws://${HOST_EXTERNAL}:${PORT_EXTERNAL}"
        VITE_CLIENT_ID: "${CLIENT_ID}"
        VITE_MOCK: ${VITE_MOCK}
  scrap-service:
    image: tcero76/scrap-service:${TAG}
    build:
      dockerfile: ./scrap-service/deploy/Dockerfile
      context: .
      target: ${PROFILE}
  beat-service:
    image: tcero76/beat-service:${TAG}
    build:
      dockerfile: beat-service/deploy/Dockerfile
      context: .
      target: ${PROFILE}
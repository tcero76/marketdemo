services:
  grafana:
    image: grafana/grafana:12.0.1
    hostname: grafana
    container_name: grafana
    profiles:
      - monitoring
    tty: true
    stdin_open: true
    ports:
      - 3030:3000
    volumes:
      - ${GRAFANA_VOLUME}:/var/lib/grafana
      - ./infra/docker/config/postgres_exporter/postgres_observability/alerts/pg_up.yml:/etc/grafana/provisioning/alerting/pg_up.yml
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

      - GF_SMTP_ENABLED=true

      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=leonardo.lastra@gmail.com
      - GF_SMTP_PASSWORD=${SMTP_PASS}

      - GF_SMTP_FROM_ADDRESS=leonardo.lastra@gmail.com
      - GF_SMTP_FROM_NAME=PostgreSQL Observability

      - GF_SMTP_SKIP_VERIFY=false
      - GF_SMTP_STARTTLS_POLICY=MandatoryStartTLS

    networks:
      - ${NETWORK_APPLICATION}
    labels:
      - traefik.enable=true
      - traefik.http.routers.monitoring.rule=Host(`monitoring.${HOST_EXTERNAL}`)
      - traefik.http.routers.monitoring.entrypoints=websecure
      - traefik.http.routers.monitoring.tls=true
      - traefik.http.services.monitoring.loadbalancer.server.port=3000
  prometheus:
    image: prom/prometheus:v3.4.0
    hostname: prometheus
    container_name: prometheus
    profiles:
      - monitoring
    tty: true
    stdin_open: true
    ports:
      - 9090:9090
    labels:
      - traefik.enable=true
      - traefik.http.routers.prometheus.rule=Host(`prom.${HOST_EXTERNAL}`)
      - traefik.http.routers.prometheus.entrypoints=websecure
      - traefik.http.routers.prometheus.tls=true
      - traefik.http.services.prometheus.loadbalancer.server.port=9090
    volumes:
      - ./infra/docker/config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ${PROMETHEUS_VOLUME}:/prometheus
    networks:
      - ${NETWORK_APPLICATION:-application}
  node_exporter:
    image: prom/node-exporter:v1.9.1
    container_name: node_exporter
    profiles:
      - monitoring
    tty: true
    stdin_open: true
    ports:
      - "9100:9100"
    networks:
      - ${NETWORK_APPLICATION}
  pg_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter
    container_name: postgres_exporter
    command:
      - --log.level=debug
      - --extend.query-path=/etc/postgres_exporter/custom_queries.yaml
    volumes:
      - ./infra/docker/config/postgres_exporter/postgres_observability/exporters/custom_queries.yaml:/etc/postgres_exporter/custom_queries.yaml
    profiles:
      - monitoring
    tty: true
    stdin_open: true
    environment:
      - DATA_SOURCE_URI=${POSTGRES_HOST}:5432/${POSTGRES_DB}?sslmode=disable
      - DATA_SOURCE_USER=${POSTGRES_USER}
      - DATA_SOURCE_PASS=${POSTGRES_PASSWORD}
    ports:
      - "9187:9187"
    networks:
      - ${NETWORK_APPLICATION:-application}
  loki:
    image: grafana/loki:3.5.0
    container_name: loki
    profiles:
      - monitoring
    command:
      - -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/docker/config/loki:/etc/loki
      - ${LOKI_VOLUME}:/loki
    ports:
      - 3100:3100
    networks:
      - ${NETWORK_APPLICATION}

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    profiles:
      - monitoring
    ports:
      - "12345:12345"
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/docker/config/alloy:/etc/alloy
    command:
      - run
      - /etc/alloy/config.alloy
    networks:
      - ${NETWORK_APPLICATION}

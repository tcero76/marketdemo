services:
  grafana:
    image: grafana/grafana:12.0.1
    hostname: grafana
    container_name: grafana
    profiles:
      - monitoring
    tty: true
    stdin_open: true
    ports:
      - 3030:3000
    volumes:
      - ${GRAFANA_VOLUME}:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - ${NETWORK_APPLICATION}
  prometheus:
    image: prom/prometheus:v3.4.0
    hostname: prometheus
    container_name: prometheus
    profiles:
      - monitoring
    tty: true
    stdin_open: true
    ports:
      - 9090:9090
    volumes:
      - ./infra/docker/config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ${PROMETHEUS_VOLUME}:/prometheus
    networks:
      - ${NETWORK_APPLICATION:-application}
  node_exporter:
    image: prom/node-exporter:v1.9.1
    container_name: node_exporter
    profiles:
      - monitoring
    tty: true
    stdin_open: true
    ports:
      - "9100:9100"
    networks:
      - ${NETWORK_APPLICATION}
  pg_exporter:
    image: tcero76/pg_exporter:v0.0.0
    container_name: postgres_exporter
    command:
      - --collector.locks
      - --collector.database
      - --collector.stat
      - --collector.replication
      - --collector.index
      - --collector.statements
      - --collector.tls
      - --collector.exporter
    profiles:
      - monitoring
    tty: true
    stdin_open: true
    # volumes:
    #   - ./infra/docker/config/postgres_exporter/queries.yml:/queries.yml
    # environment:
    #   - DATA_SOURCE_URI=
    #   - DATA_SOURCE_USER=
    #   - DATA_SOURCE_PASS=
    environment:
      - PG_EXPORTER_DSN=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "9432:9432"
    networks:
      - ${NETWORK_APPLICATION:-application}
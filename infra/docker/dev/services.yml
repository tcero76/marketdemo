services:
  bff-service:
    working_dir: /app/bff-service
    command: ["air"]
    volumes:
      - ./bff-service:/app/bff-service
      - ./config:/app/config
      - ./postgres:/app/postgres
      - ./clickhouse:/app/clickhouse
      - ./rabbitmq:/app/rabbitmq
      - ./redis:/app/redis
      - ./infra/volumes/uploads:/app/bff-service/uploads
    profiles:
      - bff
    container_name: bff
    stdin_open: true
    tty: true
    environment:
      - DNS_WRITE=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT_WRITE}/${POSTGRES_DB}?sslmode=disable&options=-c%20search_path%3Dmarketplace
      - DNS_READ=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT_READ}/${POSTGRES_DB}?sslmode=disable&options=-c%20search_path%3Dmarketplace
      - PORT=3000
      - PORT_EXTERNAL=${PORT_EXTERNAL}
      - HOST_EXTERNAL=${HOST_EXTERNAL}
      - REDIRECT_URL=${PROTOCOL_EXTERNAL}://${HOST_EXTERNAL}/bff/callback
      - HYDRA_ADMIN_URL=http://hydra:4445
      - HYDRA_PUBLIC_URL=http://hydra:4444
      - GOOGLE_OAUTH2_CLIENT_SECRET=${GOOGLE_OAUTH2_CLIENT_SECRET}
      - GOOGLE_OAUTH2_CLIENT_ID=${GOOGLE_OAUTH2_CLIENT_ID}
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - PROFILE=${PROFILE}
      - REDIS_HOST=${REDIS_HOST}
      - MONITOREO=${MONITOREO}
      - LOG_LEVEL=${LOG_LEVEL}
      - UploadImages=/app/bff-service/uploads
      - HOME_PAGE_PATH=${HOME_PAGE_PATH}
    labels:
      - traefik.enable=true
      - traefik.http.routers.bff.rule=Host(`${HOST_EXTERNAL}`) && PathPrefix(`/bff`)
      - traefik.http.middlewares.bff-strip.stripprefix.prefixes=/bff
      - traefik.http.routers.bff.middlewares=bff-strip
      - traefik.http.routers.bff.entrypoints=websecure
      - traefik.http.routers.bff.tls=true
      - traefik.http.services.bff.loadbalancer.server.port=3000
      - traefik.http.routers.bff.priority=100
    networks:
      - ${NETWORK_APPLICATION:-application}
    depends_on:
      - db
      - cache
      - broker
  ws-service:
    container_name: ws
    profiles:
      - ws
    tty: true
    stdin_open: true
    environment:
      - MIX_ENV=dev
      - CMD_CHAT_MESSAGE_DELIVERY_QUEUE=${CMD_CHAT_MESSAGE_DELIVERY_QUEUE}
      - CMD_CHAT_MESSAGE_SEND_EXCHANGE=${CMD_CHAT_MESSAGE_SEND_EXCHANGE}
      - RABBITMQ_HOST=broker
      - HYDRA_JWKS_URL=http://hydra:4444/.well-known/jwks.json
    labels:
      - traefik.enable=true
      - traefik.http.routers.ws.rule=Host(`${HOST_EXTERNAL}`) && PathPrefix(`/api`)
      - traefik.http.middlewares.ws-strip.stripprefix.prefixes=/api
      - traefik.http.routers.ws.middlewares=ws-strip
      - traefik.http.routers.ws.entrypoints=websecure
      - traefik.http.routers.ws.tls=true
      - traefik.http.services.ws.loadbalancer.server.port=4000
      - traefik.http.routers.ws.priority=100
    volumes:
      - ./ws-service:/ws-service
    depends_on:
      - broker
    networks:
      - ${NETWORK_APPLICATION:-application}
  front:
    container_name: front
    profiles:
      - front
    working_dir: /app
    command: ["npm", "run", "dev"]
    tty: true
    stdin_open: true
    environment:
      - NEXT_PUBLIC_HOST=${PROTOCOL_EXTERNAL}://${HOST_EXTERNAL}
      - NEXT_PUBLIC_WS=${PROTOCOL_WS_EXTERNAL}://${HOST_EXTERNAL}
      - NEXT_PUBLIC_HYDRA=${PROTOCOL_EXTERNAL}://auth.${HOST_EXTERNAL}
      - NEXT_PUBLIC_CLIENT_ID=${CLIENT_ID}
      - NEXT_PUBLIC_MOCK=${VITE_MOCK}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_OAUTH2_CLIENT_ID}
      - NEXT_PUBLIC_HOME_PAGE_PATH=${HOME_PAGE_PATH}
    ports:
     - 3000:3000
    volumes:
      - ./front:/app
    networks:
      - ${NETWORK_APPLICATION:-application}
    labels:
      - traefik.enable=true
      - traefik.http.routers.front.rule=Host(`${HOST_EXTERNAL}`)
      - traefik.http.routers.front.entrypoints=websecure
      # - traefik.http.routers.front.tls.certresolver=le
      - traefik.http.routers.front.tls=true
      - traefik.http.services.front.loadbalancer.server.port=3000
  scrap-service:
    working_dir: /app/scrap-service/
    profiles:
      - scrap
    command: ["/entrypoint.sh"]
    container_name: scrap-service
    tty: true
    stdin_open: true
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - BROKER=${BROKER}
      - PORT=8000
      - TOTAL_POSTS=${TOTAL_POSTS}
      - USERNAME_INSTA=${USERNAME_INSTA}
      - PASSWORD_INSTA=${PASSWORD_INSTA}
      - CMD_SCRAPY_START_QUEUE=${CMD_SCRAPY_START_QUEUE}
      - CMD_SCRAPY_START_EXCHANGE=${CMD_SCRAPY_START_EXCHANGE}
      - PROFILE=${PROFILE}
    volumes:
      - ./scrap-service:/app/scrap-service
      - ./rabbitmq:/app/rabbitmq
    depends_on:
      - broker
    networks:
      - ${NETWORK_APPLICATION:-application}
  beat-service:
    working_dir: /app/beat-service/
    profiles:
      - scrap
    container_name: beat-service
    tty: true
    stdin_open: true
    environment:
      - BROKER=${BROKER}
      - CRON_HOUR=${CRON_HOUR}
      - CRON_MINUTE=${CRON_MINUTE}
      - CMD_RECOMMENDER_CALCULATE_QUEUE=${CMD_RECOMMENDER_CALCULATE_QUEUE}
      - CMD_RECOMMENDER_CALCULATE_EXCHANGE=${CMD_RECOMMENDER_CALCULATE_EXCHANGE}
      - CMD_SCRAPY_START_QUEUE=${CMD_SCRAPY_START_QUEUE}
      - CMD_SCRAPY_START_EXCHANGE=${CMD_SCRAPY_START_EXCHANGE}
    volumes:
      - ./beat-service:/app/beat-service
      - ./rabbitmq:/app/rabbitmq
    depends_on:
      - broker
      - scrap-service
    networks:
      - ${NETWORK_APPLICATION:-application}

services:  
  broker:
    image: rabbitmq:${RABBITMQ_VERSION}
    ports:
      - 5672:5672
      - 15672:15672
    volumes:
      - ${RABBITMQ_VOLUME}:/var/lib/rabbitmq
    networks:
      - ${NETWORK_APPLICATION:-application}
    labels:
      - traefik.enable=true
      - traefik.http.routers.broker.rule=Host(`broker.${HOST_EXTERNAL}`)
      - traefik.http.routers.broker.entrypoints=websecure
      # - traefik.http.routers.broker.tls.certresolver=le
      - traefik.http.routers.broker.tls=true
      - traefik.http.services.broker.loadbalancer.server.port=15672
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.hostname == swarm-worker-0
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
  rabbitmq-init:
    image: tcero76/rabbitmq-init:${TAG}
    entrypoint: [ "sh", "/init_rabbitmq.sh" ]
    environment:
      HOST: broker
      PORT: 15672
      USERNAME: guest
      PASSWORD: guest
      CMD_RECOMMENDER_CALCULATE_QUEUE: ${CMD_RECOMMENDER_CALCULATE_QUEUE}
      CMD_SCRAPY_START_QUEUE: ${CMD_SCRAPY_START_QUEUE}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
      RABBITMQ_CHAT_CACHE_UPDATER_QUEUE: ${RABBITMQ_CHAT_CACHE_UPDATER_QUEUE}
      CMD_CHAT_MESSAGE_PERSISTENCE_QUEUE: ${CMD_CHAT_MESSAGE_PERSISTENCE_QUEUE}
      EVT_USER_REGISTERED_EMAIL_QUEUE: ${EVT_USER_REGISTERED_EMAIL_QUEUE}
      EVT_USER_REGISTERED_EXCHANGE: ${EVT_USER_REGISTERED_EXCHANGE}
      CMD_CHAT_MESSAGE_SEND_EXCHANGE: ${CMD_CHAT_MESSAGE_SEND_EXCHANGE}
      EVT_PAYMENT_COMPLETED_EXCHANGE: ${EVT_PAYMENT_COMPLETED_EXCHANGE}
      EVT_PAYMENT_PERSISTENCE_QUEUE: ${EVT_PAYMENT_PERSISTENCE_QUEUE}
      CMD_CHAT_MESSAGE_DELIVERY_QUEUE: ${CMD_CHAT_MESSAGE_DELIVERY_QUEUE}
    networks:
      - ${NETWORK_APPLICATION:-application}
    deploy:
      mode: replicated-job
      restart_policy:
        condition: none
      placement:
        constraints:
          - node.hostname == swarm-worker-0
    depends_on:
      - broker
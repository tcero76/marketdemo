services:
  bff-service:
    image: tcero76/bff-service:873ade66e05ff28417561a373fe8f8910811fd6f
    build:
      dockerfile: ./bff-service/deploy/Dockerfile
      context: .
      target: ${PROFILE}
  front:
    image: tcero76/front:8811a40cab8fea1bf973dc75ded2c99f871f525e
    build:
      dockerfile: deploy/Dockerfile
      context: ./front
      target: ${PROFILE}
  scrap-service:
    image: tcero76/scrap-service:b47455e824884168b6221a290e38b029d76f4454
    build:
      dockerfile: ./scrap-service/deploy/Dockerfile
      context: .
      target: ${PROFILE}
  beat-service:
    image: tcero76/beat-service:${TAG}
    build:
      dockerfile: beat-service/deploy/Dockerfile
      context: .
      target: ${PROFILE}
  rabbitmq-init:
    image: tcero76/rabbitmq-init:${TAG}
    build:
      dockerfile: Dockerfile
      context: infra/docker/config/rabbitmq/
  hydra:
    build:
      dockerfile: Dockerfile
      context: infra/docker/config/hydra/
      target: ${PROFILE}
  flyway:
    image: tcero76/flyway:4ea48a2edff92518f7d9652879474ce3be9f125f
    build:
      dockerfile: deploy/Dockerfile
      context: flyway/
      target: ${PROFILE}
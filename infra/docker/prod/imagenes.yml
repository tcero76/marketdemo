services:
  bff-service:
    image: tcero76/bff-service:2a0b325b24a9f7db4c440b3a9892609176490a76
    build:
      dockerfile: ./bff-service/deploy/Dockerfile
      context: .
      target: ${PROFILE}
  front:
    image: tcero76/front:f82b50fad2f660d09af3043c57e5c01fd03b659a
    build:
      dockerfile: deploy/Dockerfile
      context: ./front
      target: ${PROFILE}
  scrap-service:
    image: tcero76/scrap-service:4ea48a2edff92518f7d9652879474ce3be9f125f
    build:
      dockerfile: ./scrap-service/deploy/Dockerfile
      context: .
      target: ${PROFILE}
  beat-service:
    image: tcero76/beat-service:${TAG}
    build:
      dockerfile: beat-service/deploy/Dockerfile
      context: .
      target: ${PROFILE}
  rabbitmq-init:
    image: tcero76/rabbitmq-init:${TAG}
    build:
      dockerfile: Dockerfile
      context: infra/docker/config/rabbitmq/
  hydra:
    build:
      dockerfile: Dockerfile
      context: infra/docker/config/hydra/
      target: ${PROFILE}
  flyway:
    image: tcero76/flyway:4ea48a2edff92518f7d9652879474ce3be9f125f
    build:
      dockerfile: deploy/Dockerfile
      context: flyway/
      target: ${PROFILE}